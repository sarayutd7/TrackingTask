function renderCard(t){
  const col = getColById(t.status);
  const c = col ? col.color : 'gray';
  const last = isLastCol(t.status);
  // backward-compat: HTML notes render as-is; old [text](url) markdown still parsed
  const noteIsHtml = t.note && /<[a-z][\s\S]*>/i.test(t.note);
  const links = (!noteIsHtml && t.note) ? extractLinks(t.note) : [];
  const plainNote = (!noteIsHtml && t.note) ? noteWithoutLinks(t.note) : '';

  const linksHtml = links.length
    ? `<div class="card-links" onclick="event.stopPropagation()">
        ${links.map((url,i)=>`<a class="card-link-btn" href="${esc(url)}" target="_blank" rel="noopener" title="${esc(url)}">${linkSvg} Link ${links.length>1?i+1:''}</a>`).join('')}
       </div>`
    : '';

  const noteHtml = noteIsHtml
    ? `<div class="card-note">${t.note}</div>`
    : plainNote
      ? `<div class="card-note">${renderNote(plainNote)}</div>`
      : '';

  const nextId = getNextColId(t.status);
  const nextCol = getColById(nextId);
  const moveTitle = nextCol ? nextCol.name : '→';
  const colIdx = COLS.findIndex(x=>x.id===t.status);
  const isLast = colIdx===COLS.length-1;
  const moveSvg = isLast
    ? `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.17"/></svg>`
    : `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;

  const priorityLabels = {critical:'Critical',high:'High',medium:'Medium',low:'Low',lowest:'Lowest'};
  const priorityBadge = t.priority && priorityLabels[t.priority]
    ? `<span class="priority-badge ${t.priority}">${priorityLabels[t.priority]}</span>`
    : '';

  const clockSvg = `<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const timeRangeHtml = (t.timeStart || t.timeEnd)
    ? `<div class="card-time-range">${clockSvg} ${esc(t.timeStart||'?')} - ${esc(t.timeEnd||'?')}</div>`
    : '';

  return `<div class="card ${c}"${last?' data-done="1"':''} onclick="openModal('${esc(t.status)}','${t.id}')">
    <div class="card-title">${priorityBadge} ${esc(t.title)}</div>
    ${timeRangeHtml}
    ${noteHtml}
    ${linksHtml}
    <div class="card-footer">
      <span class="card-time">${fmtTime(t.updatedAt)}</span>
      <div class="card-actions" onclick="event.stopPropagation()">
        ${!isLast ? `<button class="icon-btn sched" title="ย้ายไปวันอื่น" onclick="openReschedule('${t.id}')"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-linecap="round" stroke-width="2.5"/><path d="M16 14l-3 3 3 3"/><line x1="13" y1="17" x2="19" y2="17"/></svg></button>` : ''}
        <button class="icon-btn move" title="${esc(moveTitle)}" onclick="moveTask('${t.id}','${nextId}')">${moveSvg}</button>
        <button class="icon-btn del" title="ลบ" onclick="deleteTask('${t.id}')">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

// ── Priority filter ──────────────────────────────────
let activePriorityFilter = '';

const PRIORITIES = [
  { id:'critical', label:'Critical', dot:'🔴' },
  { id:'high',     label:'High',     dot:'🟠' },
  { id:'medium',   label:'Medium',   dot:'🟡' },
  { id:'low',      label:'Low',      dot:'🔵' },
  { id:'lowest',   label:'Lowest',   dot:'⚪' },
];

function setPriorityFilter(p){
  activePriorityFilter = (activePriorityFilter === p) ? '' : p; // toggle off if same
  render();
}

function renderPriorityFilterBar(tasks){
  const bar = document.getElementById('priorityFilterBar');
  if(!bar) return;

  // นับจำนวนต่อ priority จากทุก task วันนี้
  const counts = {};
  PRIORITIES.forEach(p=>{ counts[p.id]=0; });
  tasks.forEach(t=>{ if(t.priority && counts[t.priority]!==undefined) counts[t.priority]++; });

  // ถ้าไม่มี task ที่มี priority เลย ซ่อน bar
  const hasAny = PRIORITIES.some(p=>counts[p.id]>0);
  bar.style.display = hasAny ? '' : 'none';
  if(!hasAny){ activePriorityFilter=''; return; }

  const allActive = !activePriorityFilter;
  bar.innerHTML =
    `<button class="pf-btn pf-all${allActive?' pf-active':''}" onclick="setPriorityFilter('')">
       ทั้งหมด<span class="pf-count">${tasks.length}</span>
     </button>` +
    PRIORITIES.filter(p=>counts[p.id]>0).map(p=>{
      const active = activePriorityFilter===p.id;
      return `<button class="pf-btn${active?' pf-active':''}" data-p="${p.id}" onclick="setPriorityFilter('${p.id}')">
        ${p.dot} ${p.label}<span class="pf-count">${counts[p.id]}</span>
      </button>`;
    }).join('');
}

function render(){
  const tasks = getTasks(currentDate);
  const g = {};
  COLS.forEach(col=>{ g[col.id]=[]; });
  tasks.forEach(t=>{
    if(t.status in g) g[t.status].push(t);
    else if(COLS[0]) g[COLS[0].id].push(t);
  });

  renderPriorityFilterBar(tasks);

  COLS.forEach(col=>{
    const listEl = document.getElementById('list-'+col.id);
    if(!listEl) return;
    const badgeEl = document.getElementById('badge-'+col.id);
    const all = g[col.id];
    const filtered = activePriorityFilter
      ? all.filter(t=>(t.priority||'') === activePriorityFilter)
      : all;
    listEl.innerHTML = filtered.length
      ? filtered.map(renderCard).join('')
      : `<div class="empty">${emptyIcon}<div>${activePriorityFilter ? 'ไม่มีงานใน filter นี้' : 'ยังไม่มีงาน'}</div></div>`;
    // badge: แสดง filtered/total เมื่อ filter active
    if(badgeEl) badgeEl.textContent = activePriorityFilter && filtered.length !== all.length
      ? `${filtered.length}/${all.length}`
      : all.length;
  });

  renderStats(g);

  // Progress: นับ "completed" col เป็น done, ไม่นับ col ที่ชื่อมี "back" ใน denominator
  const backlogCols = COLS.filter(c=>/back/i.test(c.name)).map(c=>c.id);
  const completedCol = COLS.find(c=>/complet/i.test(c.name) || c.id==='completed');
  const doneColId = completedCol ? completedCol.id : COLS.find(c=>!backlogCols.includes(c.id) && COLS.indexOf(c)===COLS.filter(c2=>!backlogCols.includes(c2.id)).length-1)?.id;
  const done = doneColId ? (g[doneColId]||[]).length : 0;
  const tot = tasks.filter(t=>!backlogCols.includes(t.status)).length;
  const pct = tot>0 ? Math.round((done/tot)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = pct+'%';

  const d = new Date(currentDate+'T00:00:00');
  const isToday = currentDate===today;
  const label = d.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('dateDisplay').innerHTML =
    label + (isToday?'<span class="date-today">วันนี้</span>':'');
}

// ── Daily Log ────────────────────────────────────────
const DL_KEY = 'dailyTodoLog';
let DL = {};

function loadDL(){
  // Merge localStorage (fallback) with file (_logs), file takes precedence
  const fromLS = {};
  try { Object.assign(fromLS, JSON.parse(localStorage.getItem(DL_KEY)||'{}')); } catch(_){}
  const fromFile = (DB._logs && typeof DB._logs==='object') ? DB._logs : {};
  DL = Object.assign({}, fromLS, fromFile);
}
function saveDL(){
  if(!DB._logs) DB._logs = {};
  Object.assign(DB._logs, DL);
  localStorage.setItem(DL_KEY, JSON.stringify(DL));
  writeFile();
}

function renderDL(){
  const log = DL[currentDate] || {};
  document.getElementById('dlBlocker').value   = log.blocker   || '';
  document.getElementById('dlHighlight').value = log.highlight || '';
  document.getElementById('dlNote').value      = log.note      || '';
  ['dlBlocker','dlHighlight','dlNote'].forEach(id => dlResize(document.getElementById(id)));
}

function dlSave(field, val){
  if(!DL[currentDate]) DL[currentDate] = {};
  DL[currentDate][field] = val;

// ── Quick Links ──────────────────────────────────────
const QL_KEY = 'dailyTodoQL';
let QL = [];
let qlActiveFilter = 'all';
let selectedQlTag  = '';

function loadQL(){
  // Merge localStorage (fallback) with file (_ql), file takes precedence
  let fromLS = [];
  try { fromLS = JSON.parse(localStorage.getItem(QL_KEY)||'[]'); } catch(_){}
  const fromFile = Array.isArray(DB._ql) ? DB._ql : null;
  QL = fromFile !== null ? fromFile : fromLS;
}
function saveQL(){
  DB._ql = QL;
  localStorage.setItem(QL_KEY, JSON.stringify(QL));
  writeFile();
}

function selectQlTag(tag){
  selectedQlTag = (selectedQlTag === tag) ? '' : tag; // toggle off if same
  document.querySelectorAll('#qlTagRow .ql-tag-pill').forEach(btn=>{
    btn.classList.toggle('active-tag', btn.dataset.tag === selectedQlTag);
  });
}

function qlSetFilter(filter){

  document.querySelectorAll('#qlFilterBar .ql-filter-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });

const qlLinkSvg = `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;

const qlTagLabels = {system:'System', document:'Document', knowledge:'Knowledge Sharing', other:'Other'};

const qlEditSvg = `<svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const qlDelSvg  = `<svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

function renderQL(){
  const body = document.getElementById('qlBody');
  const list = qlActiveFilter === 'all'
    ? QL.map((item,i)=>({item,i}))
    : QL.map((item,i)=>({item,i})).filter(({item})=>(item.tag||'') === qlActiveFilter);

  if(!list.length){
    body.innerHTML = QL.length
      ? '<span class="ql-empty">ไม่มี link ใน tag นี้</span>'
      : '<span class="ql-empty">ยังไม่มี link — กด + เพิ่ม เพื่อเพิ่ม tool link</span>';
    return;
  }
  body.innerHTML = list.map(({item,i})=>{
    const tagBadge = item.tag && qlTagLabels[item.tag]
      ? `<span class="ql-tag-badge ${item.tag}">● ${qlTagLabels[item.tag]}</span>`
      : '';
    const hasUrl = item.url && item.url.trim();
    const openBtn = hasUrl
      ? `<a class="ql-open-btn" href="${esc(item.url)}" target="_blank" rel="noopener" title="${esc(item.url)}">${qlLinkSvg} เปิด Link</a>`
      : '';
    const detailHtml = item.detail
      ? `<div class="ql-card-detail">${/<[a-z][\s\S]*>/i.test(item.detail) ? item.detail : esc(item.detail)}</div>`
      : '';
    return `
    <div class="ql-card" data-tag="${esc(item.tag||'')}">
      <div class="ql-card-top">
        <div class="ql-card-name-wrap">
          <div class="ql-card-name" title="${esc(item.name)}">${esc(item.name)}</div>
          ${openBtn}
        </div>
        <div class="ql-card-actions">
          <button class="ql-card-btn edit" onclick="qlOpenEdit(${i})" title="แก้ไข">${qlEditSvg}</button>
          <button class="ql-card-btn del"  onclick="qlDelete(${i})"   title="ลบ">${qlDelSvg}</button>
        </div>
      </div>
      ${tagBadge}
      ${detailHtml}
    </div>`;
  }).join('');
}

function qlToggle(){
  document.getElementById('qlBody').classList.toggle('collapsed');
  document.getElementById('qlChevron').classList.toggle('closed');
}

function qlDelete(i){
  QL.splice(i,1);
  saveQL();
  renderQL();
}

function qlSave(){

// ── Files Me ─────────────────────────────────────────
// ไฟล์จริงจะถูกคัดลอกเข้าไปในโฟลเดอร์ "Files-me" ที่ผู้ใช้เลือกไว้ (ผ่าน File System Access API)
// metadata (ชื่อ, รายละเอียด, ชื่อไฟล์) เก็บใน DB._files และ sync ผ่าน KV

const FILE_TYPES = {
  img:  ['png','jpg','jpeg','gif','webp','bmp','svg','ico'],
  doc:  ['doc','docx','txt','rtf','odt'],
  xls:  ['xls','xlsx','csv','ods'],
  zip:  ['zip','rar','7z','tar','gz'],
  pdf:  ['pdf'],
};
function getFileType(name){
  const ext = (name||'').split('.').pop().toLowerCase();
  for(const [type, exts] of Object.entries(FILE_TYPES)){
    if(exts.includes(ext)) return type;
  }
  return 'other';
}
const FILE_ICONS  = { img:'🖼️', doc:'📝', xls:'📊', zip:'📦', pdf:'📄', other:'📎' };
const FILE_TYPE_LABELS = { img:'IMAGE', doc:'DOC', xls:'SHEET', zip:'ARCHIVE', pdf:'PDF', other:'FILE' };

let filesFilter = 'all';
let _fileModalMode = 'add';
let _fileEditId = null;
let _filePendingFile = null; // File object (จาก showOpenFilePicker) ที่รอบันทึก

// ── IndexedDB: เก็บ directory handle ของโฟลเดอร์ "Files-me" ──
const IDB_NAME  = 'dailyTodoFilesDB';
const IDB_STORE = 'handles';
const FILES_ME_KEY = 'filesMeDir';
let _filesDirHandle = null;

function openIDB(){
  return new Promise((res, rej)=>{
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = ()=>{
      req.result.createObjectStore(IDB_STORE);
    };
    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbGet(key){
  const db = await openIDB();
  return new Promise((res, rej)=>{
    const tx = db.transaction(IDB_STORE,'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = ()=>res(req.result || null);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbSet(key, val){
  const db = await openIDB();
  return new Promise((res, rej)=>{
    const tx = db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).put(val, key);
    tx.oncomplete = ()=>res(true);
    tx.onerror = ()=>rej(tx.error);
  });
}
async function idbDel(key){
  const db = await openIDB();
  return new Promise((res, rej)=>{
    const tx = db.transaction(IDB_STORE,'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = ()=>res(true);
    tx.onerror = ()=>rej(tx.error);
  });
}

// ขอ/ตรวจสิทธิ์เข้าถึงโฟลเดอร์ "Files-me" ที่ผู้ใช้เคยเลือกไว้
async function getFilesDir(promptIfMissing=true){
  if(_filesDirHandle){
    try {
      const p = await _filesDirHandle.queryPermission({ mode:'readwrite' });
      if(p === 'granted') return _filesDirHandle;
      const p2 = await _filesDirHandle.requestPermission({ mode:'readwrite' });
      if(p2 === 'granted') return _filesDirHandle;
    } catch(_){}
  }
  try {
    const saved = await idbGet(FILES_ME_KEY);
    if(saved){
      const p = await saved.queryPermission({ mode:'readwrite' });
      if(p === 'granted'){ _filesDirHandle = saved; return saved; }
      const p2 = await saved.requestPermission({ mode:'readwrite' });
      if(p2 === 'granted'){ _filesDirHandle = saved; return saved; }
    }
  } catch(_){}

  if(!promptIfMissing) return null;

  try {
    showToast('เลือกโฟลเดอร์ "Files-me" ที่สร้างไว้ 📁');
    const dir = await window.showDirectoryPicker({ mode:'readwrite' });
    await idbSet(FILES_ME_KEY, dir);
    _filesDirHandle = dir;
    return dir;
  } catch(_){
    return null;
  }
}

function filesLoad(){
  filesRenderGrid();
}

function filesSetFilter(ft){
  filesFilter = ft;
  document.querySelectorAll('#filesFilterBar .ff-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.ft===ft);
  });
  filesRenderGrid();
}

function filesRenderGrid(){
  if(!DB._files) DB._files = [];
  const q = ((document.getElementById('filesSearch')||{}).value||'').toLowerCase();
  let list = DB._files.slice();
  if(filesFilter!=='all') list = list.filter(f=>getFileType(f.fileName)===filesFilter);
  if(q) list = list.filter(f=>(f.name||'').toLowerCase().includes(q)||(f.detail||'').toLowerCase().includes(q));
  list.sort((a,b)=>new Date(b.addedAt)-new Date(a.addedAt));

  const grid = document.getElementById('filesGrid');
  if(!list.length){
    const msg = DB._files.length===0
      ? '📂 ยังไม่มีไฟล์ — กด <strong>+ เพิ่มไฟล์</strong> เพื่อเริ่มต้น'
      : '🔍 ไม่พบไฟล์ที่ตรงกับการค้นหา';
    grid.innerHTML = `<div class="files-empty">${msg}</div>`;
    return;
  }
  grid.innerHTML = list.map(f=>{
    const type = getFileType(f.fileName);
    const icon = FILE_ICONS[type];
    const badge = FILE_TYPE_LABELS[type];
    const sizeStr = !f.size ? '' : f.size < 1024 ? f.size+'B'
      : f.size < 1048576 ? (f.size/1024).toFixed(1)+'KB'
      : (f.size/1048576).toFixed(1)+'MB';
    const addedDate = new Date(f.addedAt).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
    const detailHtml = f.detail ? `<div class="file-detail">${esc(f.detail)}</div>` : '';
    return `
    <div class="file-card" onclick="filesOpenFile('${f.id}')" title="คลิกเพื่อเปิด ${esc(f.fileName)}">
      <div class="file-actions" onclick="event.stopPropagation()">
        <button class="file-act-btn edit" onclick="filesEditOpen('${f.id}')" title="แก้ไข">
          <svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="file-act-btn del" onclick="filesDelete('${f.id}')" title="ลบ">
          <svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>
      <div class="file-icon">${icon}</div>
      <div class="file-name">${esc(f.name)}</div>
      ${detailHtml}
      <span class="file-type-badge ${type}">${badge}</span>
      <div class="file-meta">${sizeStr ? sizeStr+' · ' : ''}${esc(f.fileName)}<br>${addedDate}</div>
    </div>`;
  }).join('');
}

// เลือกไฟล์จากเครื่อง → คัดลอกเข้าโฟลเดอร์ Files-me ทีหลังตอนกดบันทึก
async function filesAdd(){
  try {
    const [handle] = await window.showOpenFilePicker({ multiple: false });
    const file = await handle.getFile();
    _filePendingFile = file;
    _fileModalMode = 'add';
    _fileEditId = null;
    document.getElementById('fmTitle').textContent = '+ เพิ่มไฟล์';
    document.getElementById('fmNameInput').value = file.name.replace(/\.[^.]+$/, '');
    rteClear('fmDetailBody');
    document.getElementById('fmOrigInfo').textContent = '📎 ' + file.name;
    document.getElementById('fileModal').style.display='flex';
    setTimeout(()=>{ const n=document.getElementById('fmNameInput'); n.focus(); n.select(); }, 60);
  } catch(_){}
}

function filesEditOpen(id){
  if(!DB._files) return;
  const f = DB._files.find(x=>x.id===id);
  if(!f) return;
  _fileModalMode = 'edit';
  _fileEditId = id;
  _filePendingFile = null;
  document.getElementById('fmTitle').textContent = '✏️ แก้ไขข้อมูลไฟล์';
  document.getElementById('fmNameInput').value = f.name;
  rteSetHTML('fmDetailBody', f.detail||'');
  document.getElementById('fmOrigInfo').textContent = '📎 ' + f.fileName;
  document.getElementById('fileModal').style.display='flex';
  setTimeout(()=>{ document.getElementById('fmNameInput').focus(); }, 60);
}

function fileModalClose(){
  document.getElementById('fileModal').style.display='none';
  _filePendingFile = null;
  _fileEditId = null;
}
function fileModalCloseOnBg(e){
  if(e.target===document.getElementById('fileModal')) fileModalClose();
}

// เขียนไฟล์ลงในโฟลเดอร์ Files-me (สร้างชื่อไม่ซ้ำถ้ามีไฟล์ชื่อเดียวกันอยู่แล้ว)
async function writeFileToFilesMeDir(file){
  const dir = await getFilesDir(true);
  if(!dir) throw new Error('ไม่ได้เลือกโฟลเดอร์ Files-me');

  let targetName = file.name;
  let i = 1;
  while(true){
    try {
      await dir.getFileHandle(targetName, { create:false });
      const dot = file.name.lastIndexOf('.');
      const base = dot>-1 ? file.name.slice(0,dot) : file.name;
      const ext  = dot>-1 ? file.name.slice(dot) : '';
      targetName = `${base} (${i})${ext}`;
      i++;
    } catch(_){ break; } // ไม่มีไฟล์ชื่อนี้ → ใช้ชื่อนี้ได้
  }

  const fh = await dir.getFileHandle(targetName, { create:true });
  const writable = await fh.createWritable();
  await writable.write(file);
  await writable.close();
  return targetName;
}

async function fileModalSave(){
  const name = document.getElementById('fmNameInput').value.trim();
  if(!name){ document.getElementById('fmNameInput').focus(); return; }
  const detail = rteGetHTML('fmDetailBody');

  if(_fileModalMode==='add'){
    if(!_filePendingFile) return;
    let savedFileName;
    try {
      savedFileName = await writeFileToFilesMeDir(_filePendingFile);
    } catch(e){
      showToast('บันทึกไฟล์ลงโฟลเดอร์ไม่สำเร็จ: '+e.message);
      return;
    }
    const id = Math.random().toString(36).slice(2)+Date.now().toString(36);
    const entry = { id, name, fileName: savedFileName, detail, size: _filePendingFile.size, addedAt: new Date().toISOString() };
    if(!DB._files) DB._files = [];
    DB._files.push(entry);
    await writeFile();
    showToast('เพิ่ม "'+name+'" ลงโฟลเดอร์ Files-me แล้ว 📂');
  } else {
    if(!DB._files) return;
    const idx = DB._files.findIndex(x=>x.id===_fileEditId);
    if(idx<0) return;
    DB._files[idx].name = name;
    DB._files[idx].detail = detail;
    await writeFile();
    showToast('บันทึกแล้ว ✔');
  }
  fileModalClose();
  filesRenderGrid();
}

// เปิดไฟล์จากโฟลเดอร์ Files-me
async function filesOpenFile(id){
  if(!DB._files) return;
  const f = DB._files.find(x=>x.id===id);
  if(!f){ showToast('ไม่พบข้อมูลไฟล์'); return; }
  try {
    const dir = await getFilesDir(true);
    if(!dir){ showToast('ไม่ได้เลือกโฟลเดอร์ Files-me'); return; }
    const fh = await dir.getFileHandle(f.fileName, { create:false });
    const file = await fh.getFile();
    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url;
    const type = getFileType(f.fileName);
    if(type==='img'||type==='pdf'){ a.target='_blank'; }
    else { a.download = f.fileName; }
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 8000);
  } catch(e){
    showToast('ไม่สามารถเปิดไฟล์ได้ (อาจถูกย้าย/ลบจากโฟลเดอร์): '+e.message);
  }
}

async function filesDelete(id){
  if(!DB._files) return;
  const f = DB._files.find(x=>x.id===id);
  if(!f) return;
  if(!confirm(`ลบ "${f.name}" ออกจากรายการ และลบไฟล์ "${f.fileName}" จากโฟลเดอร์ Files-me ด้วยหรือไม่?`)) return;
  try {
    const dir = await getFilesDir(false);
    if(dir) await dir.removeEntry(f.fileName);
  } catch(_){}
  DB._files = DB._files.filter(x=>x.id!==id);
  await writeFile();
  showToast('ลบ "'+f.name+'" แล้ว');
  filesRenderGrid();
}

// ── Initial render (ต้องอยู่ท้ายสุด เพื่อให้ const ทุกตัวถูก initialize ก่อน) ──
loadCols();
renderBoard();
loadFile().then(() => {
  render();
  loadDL();
  renderDL();
  loadQL();
  renderQL();
  filesRenderGrid();
});
